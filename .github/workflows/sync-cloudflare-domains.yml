name: Sync Cloudflare Domains

on:
  workflow_dispatch:

jobs:
  sync-domains:
    name: Sync Pages custom domains
    runs-on: ubuntu-latest
    environment: "CLOUDFLARE_API_TOKEN"
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Sync Cloudflare Pages domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run cf:domains:sync
