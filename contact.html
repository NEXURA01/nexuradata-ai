<!DOCTYPE html>
<html lang="fr-CA">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact | NEXURA</title>
  <meta name="description" content="Send a manual operational inquiry to NEXURA.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="NEXURA">
  <link rel="canonical" href="https://nexuradata.ca/contact">
  <link rel="stylesheet" href="/assets/css/site.css?v=20260512-flow">
  <script src="/assets/js/site.js" defer></script>
</head>

<body class="ai-positioning">
  <header class="site-header">
    <div class="container">
      <nav class="site-nav" aria-label="Navigation principale">
        <a class="brand" href="/" aria-label="Accueil NEXURA"><img src="/assets/nexuradata-master.svg" alt="NEXURA" class="brand-logo" width="200" height="24"></a>
        <div class="nav-links">
          <a href="/#platform">Platform</a>
          <a href="/services">Services</a>
          <a href="/pricing">Pricing</a>
          <a href="/operational-assessment">Assessment</a>
          <a href="/contact">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-shell" id="contenu">
    <div class="container">
      <section class="page-card page-content">
        <p class="eyebrow">Contact</p>
        <h1>Send a manual operational inquiry.</h1>
        <p>Contact has one purpose: submit a non-payment inquiry that NEXURA can review and answer through the provided email.</p>
      </section>

      <form class="page-card contact-form" data-contact-form data-contact-endpoint="/api/intake" novalidate>
        <div class="form-grid">
          <label class="field">
            <span>Company</span>
            <input name="organization" autocomplete="organization" required>
          </label>

          <label class="field">
            <span>Name</span>
            <input name="contact_name" autocomplete="name" required>
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>

          <label class="field">
            <span>Urgency</span>
            <select name="urgency" required>
              <option value="">Choose</option>
              <option value="Standard">Standard</option>
              <option value="Rapide">Priority</option>
              <option value="Urgent">Urgent</option>
            </select>
          </label>

          <label class="field field-full">
            <span>Operational inquiry</span>
            <textarea name="message" rows="6" placeholder="Describe the operational issue, workflow, dashboard need, or AI analysis request." required></textarea>
          </label>

          <label class="field field-full consent-row">
            <input type="checkbox" name="consentement" required>
            <span>NEXURA may review this inquiry and respond through the provided contact email.</span>
          </label>
        </div>

        <input type="hidden" name="website" value="">
        <button type="submit" class="button button-primary">Send Operational Inquiry</button>
        <p class="form-status" data-contact-status aria-live="polite"></p>
      </form>
    </div>
  </main>
</body>

</html>
