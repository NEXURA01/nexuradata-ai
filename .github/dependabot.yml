version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    ignore:
      # Dependabot currently cannot resolve a security update path for postcss
      # with the active Next.js dependency constraints in this repo.
      # Remove this ignore when upstream allows a valid patched resolution.
      - dependency-name: "postcss"
        versions:
          - "*"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
