# njsscan static security scanner — runs via pip, no third-party actions required
name: njsscan sarif

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 15 * * 4'

permissions:
  contents: read

jobs:
  njsscan:
    runs-on: ubuntu-latest
    name: njsscan code scanning
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Install njsscan
        run: pip install njsscan

      - name: Run njsscan
        run: njsscan .
